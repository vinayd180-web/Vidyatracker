<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz - Grammar Galaxy</title>
    <link rel="stylesheet" href="../css/style.css" />
    <style>
        .quiz-header {
            background: linear-gradient(135deg, #1A0A2E 0%, #0A1A2E 100%);
            margin: -16px -16px 16px -16px;
            padding: 20px 16px 28px 16px;
            color: white;
            border-radius: 0 0 var(--radius-lg) var(--radius-lg);
            border-bottom: 1px solid rgba(108,99,255,0.1);
        }

        .quiz-header .quiz-meta {
            display: flex; justify-content: space-between; font-size: 13px; opacity: 0.7; margin-bottom: 8px;
        }
        .quiz-header .quiz-topic { font-size: 18px; font-weight: 700; margin-bottom: 2px; }
        .quiz-header .quiz-subtopic { font-size: 14px; opacity: 0.7; }

        .quiz-progress {
            display: flex; align-items: center; gap: 12px; margin: 12px 0;
        }
        .quiz-progress .progress-track {
            flex: 1; height: 6px; background: rgba(255,255,255,0.05);
            border-radius: var(--radius-full); overflow: hidden;
        }
        .quiz-progress .progress-track .progress-fill {
            height: 100%; background: var(--primary-gradient);
            border-radius: var(--radius-full); transition: width 0.6s ease;
            box-shadow: var(--glow-primary);
        }
        .quiz-progress .progress-text {
            font-size: 13px; font-weight: 600; color: var(--text-secondary); min-width: 50px;
        }

        .question-card {
            background: var(--bg-card);
            padding: 20px;
            border-radius: var(--radius-md);
            box-shadow: 0 2px 12px rgba(108,99,255,0.08);
            margin: 12px 0;
            border: 1px solid rgba(108,99,255,0.05);
        }

        .question-card .question-number {
            font-size: 12px; color: var(--text-muted); font-weight: 600;
            margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px;
        }
        .question-card .question-text {
            font-size: 17px; font-weight: 500; line-height: 1.7; margin-bottom: 16px;
            color: var(--text-primary);
        }
        .question-card .question-marks {
            display: inline-block; background: rgba(108,99,255,0.1);
            color: var(--primary); padding: 2px 12px; border-radius: var(--radius-full);
            font-size: 11px; font-weight: 600; margin-bottom: 12px;
        }

        .options-grid { display: flex; flex-direction: column; gap: 8px; }

        .option-btn {
            padding: 12px 16px;
            border: 2px solid rgba(108,99,255,0.1);
            border-radius: var(--radius-sm);
            background: rgba(255,255,255,0.02);
            font-size: 14px;
            cursor: pointer;
            transition: var(--transition);
            text-align: left;
            display: flex;
            align-items: center;
            gap: 12px;
            font-family: var(--font-family);
            color: var(--text-secondary);
            width: 100%;
        }
        .option-btn:hover:not(.disabled) {
            border-color: var(--primary);
            background: rgba(108,99,255,0.05);
            transform: translateX(4px);
            color: white;
        }
        .option-btn .option-letter {
            width: 28px; height: 28px; border-radius: 50%;
            background: rgba(255,255,255,0.03);
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 12px; flex-shrink: 0;
            transition: var(--transition); color: var(--text-muted);
        }
        .option-btn.selected { border-color: var(--primary); background: rgba(108,99,255,0.05); }
        .option-btn.selected .option-letter { background: var(--primary); color: white; }
        .option-btn.correct { border-color: var(--success); background: rgba(0,210,160,0.05); }
        .option-btn.correct .option-letter { background: var(--success); color: white; }
        .option-btn.wrong { border-color: var(--danger); background: rgba(255,90,95,0.05); }
        .option-btn.wrong .option-letter { background: var(--danger); color: white; }
        .option-btn.disabled { cursor: default; opacity: 0.6; }
        .option-btn .option-check { margin-left: auto; font-size: 18px; }

        .quiz-actions { display: flex; gap: 10px; margin: 12px 0; }

        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            flex: 1;
            font-family: var(--font-family);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .btn:active { transform: scale(0.96); }

        .btn-primary {
            background: var(--primary-gradient);
            color: white;
            box-shadow: var(--glow-primary);
        }
        .btn-primary:hover:not(:disabled) {
            box-shadow: 0 0 40px rgba(108,99,255,0.4);
            transform: translateY(-2px);
        }
        .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

        .btn-secondary {
            background: rgba(255,255,255,0.03);
            color: var(--text-secondary);
            border: 1px solid rgba(255,255,255,0.05);
        }
        .btn-secondary:hover { background: rgba(255,255,255,0.05); color: white; }

        .btn-gold {
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            color: #1A1A2E;
            font-weight: 700;
        }
        .btn-gold:hover { box-shadow: 0 0 40px rgba(255,215,0,0.3); transform: translateY(-2px); }

        @media (max-width: 430px) {
            .question-card .question-text { font-size: 15px; }
        }
        @media (max-width: 360px) {
            .quiz-actions { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div id="quiz-page">
        <!-- Header -->
        <div class="quiz-header">
            <div class="quiz-meta">
                <span id="quiz-section-label">Chapter</span>
                <span id="quiz-timer">⏱️ 0:00</span>
            </div>
            <div class="quiz-topic" id="quiz-topic-name">Topic</div>
            <div class="quiz-subtopic" id="quiz-subtopic-name">Practice</div>
        </div>

        <!-- Progress -->
        <div class="quiz-progress">
            <span class="progress-text" id="quiz-progress-text">1/10</span>
            <div class="progress-track"><div class="progress-fill" id="quiz-progress-fill" style="width:10%;"></div></div>
            <span class="progress-text" id="quiz-score-display">⭐ 0</span>
        </div>

        <!-- Question -->
        <div class="question-card" id="question-card">
            <div class="question-number" id="question-number">Question 1</div>
            <div class="question-marks" id="question-marks">1 mark</div>
            <div class="question-text" id="question-text">Loading...</div>
            <div class="options-grid" id="options-container"></div>
            <div style="margin-top:12px;">
                <button class="btn btn-secondary" onclick="speakQuestion()" style="width:100%;">🔊 Listen</button>
            </div>
        </div>

        <!-- Actions -->
        <div class="quiz-actions">
            <button class="btn btn-secondary" onclick="resetQuiz()">🔄 Reset</button>
            <button class="btn btn-primary" id="next-btn" onclick="nextQuestion()" disabled>Next →</button>
        </div>
    </div>

    <script>
        // ============================================
        // QUIZ STATE
        // ============================================

        let quizState = {
            questions: [],
            currentIndex: 0,
            selectedAnswer: null,
            isAnswered: false,
            score: 0,
            startTime: null,
            timerInterval: null,
            elapsedSeconds: 0,
            currentTopic: null,
            currentClass: null
        };

        let appState = {
            coins: parseInt(localStorage.getItem('grammarGalaxyCoins')) || 0,
            streak: parseInt(localStorage.getItem('grammarGalaxyStreak')) || 0,
            xp: parseInt(localStorage.getItem('grammarGalaxyXP')) || 0,
            level: parseInt(localStorage.getItem('grammarGalaxyLevel')) || 1,
            totalQuestions: parseInt(localStorage.getItem('grammarGalaxyQuestions')) || 0,
            correctAnswers: parseInt(localStorage.getItem('grammarGalaxyCorrect')) || 0,
            completedTopics: JSON.parse(localStorage.getItem('grammarGalaxyCompleted') || '[]'),
            selectedClass: parseInt(localStorage.getItem('grammarGalaxyClass')) || 8
        };

        // ============================================
        // UTILITY FUNCTIONS
        // ============================================

        function getLetter(index) {
            return String.fromCharCode(65 + index);
        }

        function formatTime(seconds) {
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            return `${m}:${s.toString().padStart(2, '0')}`;
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function showToast(message, type = 'info') {
            // Use parent toast if available
            if (window.parent && window.parent.showToast) {
                window.parent.showToast(message, type);
            } else {
                alert(message);
            }
        }

        function launchConfetti() {
            if (window.parent && window.parent.launchConfetti) {
                window.parent.launchConfetti();
            }
        }

        function speakText(text) {
            if (!window.speechSynthesis) return;
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = 0.9;
            utterance.pitch = 1;
            utterance.lang = 'en-IN';
            window.speechSynthesis.speak(utterance);
        }

        // ============================================
        // QUIZ FUNCTIONS
        // ============================================

        function startQuiz(topicId, classNum) {
            const questions = getTopicQuestions(topicId, classNum);
            if (!questions || questions.length === 0) {
                showToast('No questions available.', 'error');
                return;
            }

            quizState.questions = shuffleArray([...questions]);
            quizState.currentIndex = 0;
            quizState.selectedAnswer = null;
            quizState.isAnswered = false;
            quizState.score = 0;
            quizState.elapsedSeconds = 0;
            quizState.currentTopic = topicId;
            quizState.currentClass = classNum;

            if (quizState.timerInterval) clearInterval(quizState.timerInterval);
            quizState.startTime = Date.now();
            quizState.timerInterval = setInterval(updateTimer, 1000);

            const topicData = getTopicData(classNum, topicId);
            document.getElementById('quiz-section-label').textContent = `Class ${classNum}`;
            document.getElementById('quiz-topic-name').textContent = topicData ? topicData.title : 'Practice';
            document.getElementById('quiz-subtopic-name').textContent = `${quizState.questions.length} Questions`;

            renderQuestion();
            updateQuizUI();
        }

        function renderQuestion() {
            const question = quizState.questions[quizState.currentIndex];
            if (!question) return;

            document.getElementById('question-number').textContent =
                `Question ${quizState.currentIndex + 1} of ${quizState.questions.length}`;
            document.getElementById('question-marks').textContent = `1 mark`;
            document.getElementById('question-text').textContent = question.q;

            const container = document.getElementById('options-container');
            container.innerHTML = '';

            question.options.forEach((option, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerHTML = `
                    <span class="option-letter">${getLetter(index)}</span>
                    <span>${option}</span>
                    <span class="option-check"></span>
                `;
                btn.dataset.index = index;
                btn.onclick = () => selectAnswer(index);
                container.appendChild(btn);
            });

            quizState.selectedAnswer = null;
            quizState.isAnswered = false;
            document.getElementById('next-btn').disabled = true;

            document.querySelectorAll('.option-btn').forEach(btn => {
                btn.classList.remove('selected', 'correct', 'wrong', 'disabled');
                btn.querySelector('.option-check').textContent = '';
            });
        }

        function selectAnswer(index) {
            if (quizState.isAnswered) return;

            const question = quizState.questions[quizState.currentIndex];
            quizState.selectedAnswer = index;
            quizState.isAnswered = true;
            const isCorrect = index === question.correct;

            if (isCorrect) quizState.score++;

            const options = document.querySelectorAll('.option-btn');
            options.forEach((btn, i) => {
                btn.classList.add('disabled');
                if (i === question.correct) {
                    btn.classList.add('correct');
                    btn.querySelector('.option-check').textContent = '✅';
                } else if (i === index && !isCorrect) {
                    btn.classList.add('wrong');
                    btn.querySelector('.option-check').textContent = '❌';
                }
                if (i === index) btn.classList.add('selected');
            });

            document.getElementById('next-btn').disabled = false;
            updateQuizUI();

            // Update app state
            appState.totalQuestions++;
            if (isCorrect) appState.correctAnswers++;
            saveAppState();

            if (isCorrect) {
                showToast('✅ Correct! Well done!', 'success');
                addCoins(5);
                addXP(10);
            } else {
                showToast(`❌ Incorrect. ${question.explanation || ''}`, 'error');
            }

            if (question.explanation) {
                setTimeout(() => speakText(question.explanation), 1000);
            }
        }

        function nextQuestion() {
            if (!quizState.isAnswered) return;

            if (quizState.currentIndex < quizState.questions.length - 1) {
                quizState.currentIndex++;
                renderQuestion();
                updateQuizUI();
                document.getElementById('next-btn').textContent = 'Next →';
                document.getElementById('next-btn').disabled = true;
            } else {
                finishQuiz();
            }
        }

        function finishQuiz() {
            if (quizState.timerInterval) {
                clearInterval(quizState.timerInterval);
                quizState.timerInterval = null;
            }

            const total = quizState.questions.length;
            const percentage = total > 0 ? (quizState.score / total * 100) : 0;

            // Mark topic as completed if score >= 70%
            if (percentage >= 70 && quizState.currentTopic) {
                if (!appState.completedTopics.includes(quizState.currentTopic)) {
                    appState.completedTopics.push(quizState.currentTopic);
                    saveAppState();
                    addCoins(20);
                    addXP(50);
                    launchConfetti();
                    showToast('🎉 Topic Mastered! +20 bonus coins!', 'gold');
                }
            }

            const coinsEarned = quizState.score * 5;
            addCoins(coinsEarned);
            addXP(20);

            // Show results
            document.getElementById('modal-icon').innerHTML = '🎉';
            document.getElementById('modal-title').textContent = percentage >= 70 ? '🌟 Amazing Work!' : '📚 Keep Learning!';
            document.getElementById('modal-score-number').textContent = `${quizState.score}/${total}`;
            document.getElementById('modal-accuracy').textContent = `${Math.round(percentage)}%`;
            document.getElementById('modal-coins').textContent = `🪙 +${coinsEarned}`;

            let message = '';
            if (percentage >= 90) message = '🌟 Outstanding! You\'re a Grammar Master!';
            else if (percentage >= 70) message = '👏 Great job! Keep exploring the galaxy!';
            else if (percentage >= 50) message = '📖 Good effort! Review and try again!';
            else message = '💪 Don\'t give up! Practice makes perfect!';
            document.getElementById('modal-message').textContent = message;

            document.getElementById('modal-action-btn').textContent = '📊 View Progress';
            document.getElementById('modal-action-btn').onclick = () => {
                closeModal();
                goBack();
            };

            document.getElementById('modal').classList.add('show');

            document.getElementById('next-btn').textContent = '✅ Done';
            document.getElementById('next-btn').disabled = true;

            // Notify parent to update dashboard
            if (window.parent) {
                window.parent.postMessage({ type: 'updateDashboard' }, '*');
            }
        }

        function resetQuiz() {
            if (quizState.timerInterval) {
                clearInterval(quizState.timerInterval);
                quizState.timerInterval = null;
            }
            if (quizState.currentTopic && quizState.currentClass) {
                startQuiz(quizState.currentTopic, quizState.currentClass);
            }
            document.getElementById('next-btn').textContent = 'Next →';
        }

        function updateTimer() {
            quizState.elapsedSeconds = Math.floor((Date.now() - quizState.startTime) / 1000);
            document.getElementById('quiz-timer').textContent = `⏱️ ${formatTime(quizState.elapsedSeconds)}`;
        }

        function updateQuizUI() {
            const total = quizState.questions.length;
            const current = quizState.currentIndex + 1;
            document.getElementById('quiz-progress-text').textContent = `${current}/${total}`;
            document.getElementById('quiz-progress-fill').style.width = `${(current / total) * 100}%`;
            document.getElementById('quiz-score-display').textContent = `⭐ ${quizState.score}`;
        }

        function speakQuestion() {
            const questionText = document.getElementById('question-text').textContent;
            const options = document.querySelectorAll('.option-btn');
            let fullText = questionText + '. Options: ';
            options.forEach((btn, index) => {
                const text = btn.querySelector('span:last-child')?.textContent || '';
                fullText += `${getLetter(index)}. ${text}. `;
            });
            speakText(fullText);
        }

        // ============================================
        // APP STATE FUNCTIONS
        // ============================================

        function saveAppState() {
            localStorage.setItem('grammarGalaxyCoins', appState.coins);
            localStorage.setItem('grammarGalaxyStreak', appState.streak);
            localStorage.setItem('grammarGalaxyXP', appState.xp);
            localStorage.setItem('grammarGalaxyLevel', appState.level);
            localStorage.setItem('grammarGalaxyQuestions', appState.totalQuestions);
            localStorage.setItem('grammarGalaxyCorrect', appState.correctAnswers);
            localStorage.setItem('grammarGalaxyCompleted', JSON.stringify(appState.completedTopics));
        }

        function addCoins(amount) {
            appState.coins += amount;
            saveAppState();
            showToast(`🪙 +${amount} coins earned!`, 'gold');
        }

        function addXP(amount) {
            appState.xp += amount;
            const xpNeeded = appState.level * 100;
            if (appState.xp >= xpNeeded) {
                appState.level++;
                appState.xp = 0;
                showToast(`🎉 Level Up! You're now Level ${appState.level}!`, 'success');
                launchConfetti();
                addCoins(50);
            }
            saveAppState();
        }

        // ============================================
        // NAVIGATION
        // ============================================

        function goBack() {
            if (window.parent) {
                window.parent.postMessage({
                    type: 'navigate',
                    page: 'dashboard'
                }, '*');
            }
        }

        // ============================================
        // MODAL (built-in)
        // ============================================

        function closeModal() {
            document.getElementById('modal').classList.remove('show');
        }

        // ============================================
        // INITIALIZATION
        // ============================================

        window.initPage = function() {
            // Check for data from parent
            const urlParams = new URLSearchParams(window.location.search);
            const topicId = urlParams.get('topic');
            const classNum = parseInt(urlParams.get('class')) || 8;

            if (topicId) {
                startQuiz(topicId, classNum);
            } else {
                document.getElementById('question-text').textContent = 'No topic selected. Go back and choose a topic.';
            }
        };

        // Listen for messages from parent
        window.addEventListener('message', function(event) {
            if (event.data.type === 'startQuiz') {
                startQuiz(event.data.topicId, event.data.class);
            }
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            const num = parseInt(e.key);
            if (num >= 1 && num <= 4) {
                const options = document.querySelectorAll('.option-btn:not(.disabled)');
                if (options[num - 1]) options[num - 1].click();
            }
            if (e.key === 'Enter' || e.key === ' ') {
                const nextBtn = document.getElementById('next-btn');
                if (!nextBtn.disabled) nextBtn.click();
            }
            if (e.key === 'r' || e.key === 'R') resetQuiz();
            if (e.key === 'l' || e.key === 'L') speakQuestion();
            if (e.key === 'Escape') closeModal();
        });

        console.log('📝 Quiz page loaded!');
    </script>
</body>
</html>
