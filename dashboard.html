<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard - Grammar Galaxy</title>
    <link rel="stylesheet" href="../css/style.css" />
    <style>
        /* Dashboard specific styles */
        .greeting-section { padding: 16px 0 8px 0; }
        .greeting-section .greeting { font-size: 14px; color: var(--text-muted); }
        .greeting-section .user-name { font-size: 24px; font-weight: 700; color: var(--text-primary); margin-top: 2px; }
        .greeting-section .user-name span {
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .section-title {
            font-size: 16px; font-weight: 700; margin: 16px 0 12px 0;
            display: flex; align-items: center; gap: 8px;
            color: var(--text-primary);
        }
        .section-title .title-icon { font-size: 20px; }
        .section-title .title-badge {
            background: var(--primary-gradient);
            color: white; font-size: 10px; padding: 2px 10px;
            border-radius: var(--radius-full); font-weight: 600;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 12px 0;
        }

        .menu-card {
            background: var(--bg-card);
            border-radius: var(--radius-md);
            padding: 20px 16px;
            box-shadow: 0 2px 12px rgba(108,99,255,0.08);
            cursor: pointer;
            transition: var(--transition);
            border: 2px solid transparent;
            position: relative;
            text-align: center;
        }
        .menu-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-md); border-color: rgba(108,99,255,0.2); }
        .menu-card:active { transform: scale(0.96); }
        .menu-card .menu-icon { font-size: 32px; margin-bottom: 8px; display: block; }
        .menu-card .menu-name { font-size: 14px; font-weight: 600; margin-bottom: 2px; color: var(--text-primary); }
        .menu-card .menu-count { font-size: 11px; color: var(--text-muted); }
        .menu-card .menu-badge {
            position: absolute;
            top: 10px; right: 10px;
            font-size: 10px;
            background: rgba(108,99,255,0.1);
            color: var(--primary);
            padding: 2px 8px;
            border-radius: var(--radius-full);
            font-weight: 600;
        }
        .menu-card .menu-badge.gold { background: rgba(255,215,0,0.1); color: var(--gold); }

        @media (max-width: 430px) {
            .menu-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
        }
        @media (max-width: 360px) {
            .menu-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <!-- ============================================
         DASHBOARD PAGE
         ============================================ -->
    <div id="dashboard-page">
        <!-- Header -->
        <div class="app-header">
            <div class="header-left">
                <h2>🌍 Grammar <span class="star">⭐</span> Galaxy</h2>
            </div>
            <div class="header-right">
                <div class="coin-display"><span class="coin-icon">🪙</span><span id="coin-count">0</span></div>
                <div class="streak-display">🔥 <span id="streak-count">0</span></div>
                <button class="icon-btn" onclick="speakText('Welcome to Grammar Galaxy!')">🔊</button>
            </div>
        </div>

        <!-- Greeting -->
        <div class="greeting-section">
            <p class="greeting">🚀 Welcome, Learner!</p>
            <h2 class="user-name">Let's Explore <span>Grammar Galaxy</span></h2>
        </div>

        <!-- Level -->
        <div class="level-container">
            <div class="level-header">
                <span class="level-badge" id="level-badge">🌟 Level 1</span>
                <span style="font-size:13px;color:var(--text-muted);" id="xp-text">0 XP</span>
            </div>
            <div class="level-progress-track">
                <div class="level-progress-fill" id="level-progress" style="width:0%;"></div>
            </div>
            <div class="level-stats">
                <span>⭐ <span id="stars-earned">0</span> Stars</span>
                <span>📚 <span id="topics-mastered">0</span> Topics</span>
                <span>🏆 <span id="quizzes-completed">0</span> Quizzes</span>
            </div>
        </div>

        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card gold"><div class="stat-icon">🪙</div><div class="stat-value" id="total-coins">0</div><div class="stat-label">Total Coins</div></div>
            <div class="stat-card primary"><div class="stat-icon">📈</div><div class="stat-value" id="accuracy">0%</div><div class="stat-label">Accuracy</div></div>
            <div class="stat-card success"><div class="stat-icon">✅</div><div class="stat-value" id="questions-done">0</div><div class="stat-label">Questions</div></div>
        </div>

        <!-- Class Selector -->
        <div class="class-selector" id="class-selector">
            <button class="class-btn active" data-class="8">🌟 8th Grade</button>
            <button class="class-btn" data-class="9">🌟 9th Grade</button>
            <button class="class-btn" data-class="10">⭐ 10th Grade</button>
        </div>

        <!-- Menu -->
        <div class="section-title">
            <span class="title-icon">📖</span> Learning Hub
            <span class="title-badge">Complete</span>
        </div>

        <div class="menu-grid" id="menu-grid"></div>
        <div style="height:20px;"></div>
    </div>

    <!-- ============================================
         DASHBOARD SCRIPT
         ============================================ -->
    <script>
        // Dashboard functionality
        let dashboardState = {
            coins: parseInt(localStorage.getItem('grammarGalaxyCoins')) || 0,
            streak: parseInt(localStorage.getItem('grammarGalaxyStreak')) || 0,
            xp: parseInt(localStorage.getItem('grammarGalaxyXP')) || 0,
            level: parseInt(localStorage.getItem('grammarGalaxyLevel')) || 1,
            totalQuestions: parseInt(localStorage.getItem('grammarGalaxyQuestions')) || 0,
            correctAnswers: parseInt(localStorage.getItem('grammarGalaxyCorrect')) || 0,
            completedTopics: JSON.parse(localStorage.getItem('grammarGalaxyCompleted') || '[]'),
            selectedClass: parseInt(localStorage.getItem('grammarGalaxyClass')) || 8
        };

        function updateDashboard() {
            document.getElementById('coin-count').textContent = dashboardState.coins;
            document.getElementById('total-coins').textContent = dashboardState.coins;
            document.getElementById('streak-count').textContent = dashboardState.streak;

            document.getElementById('level-badge').textContent = `🌟 Level ${dashboardState.level}`;
            const xpNeeded = dashboardState.level * 100;
            const xpProgress = Math.min((dashboardState.xp / xpNeeded) * 100, 100);
            document.getElementById('level-progress').style.width = xpProgress + '%';
            document.getElementById('xp-text').textContent = `${dashboardState.xp}/${xpNeeded} XP`;

            const accuracy = dashboardState.totalQuestions > 0 ?
                Math.round((dashboardState.correctAnswers / dashboardState.totalQuestions) * 100) : 0;
            document.getElementById('accuracy').textContent = accuracy + '%';
            document.getElementById('questions-done').textContent = dashboardState.totalQuestions;
            document.getElementById('stars-earned').textContent = dashboardState.completedTopics.length;
            document.getElementById('topics-mastered').textContent = dashboardState.completedTopics.length;
            document.getElementById('quizzes-completed').textContent = Math.floor(dashboardState.completedTopics.length / 2);

            renderMenu();
            updateClassSelector();
        }

        function updateClassSelector() {
            document.querySelectorAll('.class-btn').forEach(btn => {
                btn.classList.toggle('active', parseInt(btn.dataset.class) === dashboardState.selectedClass);
            });
        }

        function renderMenu() {
            const container = document.getElementById('menu-grid');
            const items = getMenuItems(dashboardState.selectedClass);
            container.innerHTML = '';
            items.forEach(item => {
                const isCompleted = dashboardState.completedTopics.includes(item.id);
                const card = document.createElement('div');
                card.className = 'menu-card';
                card.innerHTML = `
                    <span class="menu-icon">${item.icon}</span>
                    <div class="menu-name">${item.name}</div>
                    <div class="menu-count">${item.count}</div>
                    <span class="menu-badge ${isCompleted ? 'gold' : ''}">
                        ${isCompleted ? '✅ Mastered' : '📝 Learn'}
                    </span>
                `;
                card.onclick = () => {
                    const topicData = getTopicData(dashboardState.selectedClass, item.id);
                    if (topicData) {
                        window.parent.postMessage({
                            type: 'navigate',
                            page: 'cheat-sheet',
                            data: {
                                topicId: item.id,
                                class: dashboardState.selectedClass
                            }
                        }, '*');
                    }
                };
                container.appendChild(card);
            });
        }

        // Class selector
        document.querySelectorAll('.class-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                dashboardState.selectedClass = parseInt(this.dataset.class);
                localStorage.setItem('grammarGalaxyClass', dashboardState.selectedClass);
                updateDashboard();
                showToast(`📚 Switched to ${this.textContent.trim()}`, 'info');
            });
        });

        // Speech
        window.speakText = function(text) {
            if (!window.speechSynthesis) return;
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = 0.9;
            utterance.pitch = 1;
            utterance.lang = 'en-IN';
            window.speechSynthesis.speak(utterance);
        };

        // Initialize
        updateDashboard();

        // Listen for messages from parent
        window.addEventListener('message', function(event) {
            if (event.data.type === 'updateDashboard') {
                // Refresh dashboard state from localStorage
                dashboardState.coins = parseInt(localStorage.getItem('grammarGalaxyCoins')) || 0;
                dashboardState.streak = parseInt(localStorage.getItem('grammarGalaxyStreak')) || 0;
                dashboardState.xp = parseInt(localStorage.getItem('grammarGalaxyXP')) || 0;
                dashboardState.level = parseInt(localStorage.getItem('grammarGalaxyLevel')) || 1;
                dashboardState.totalQuestions = parseInt(localStorage.getItem('grammarGalaxyQuestions')) || 0;
                dashboardState.correctAnswers = parseInt(localStorage.getItem('grammarGalaxyCorrect')) || 0;
                dashboardState.completedTopics = JSON.parse(localStorage.getItem('grammarGalaxyCompleted') || '[]');
                updateDashboard();
            }
        });

        // Page initialization
        window.initPage = function() {
            updateDashboard();
        };
    </script>
</body>
</html>
